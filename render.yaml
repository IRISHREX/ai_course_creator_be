services:
  - type: web
    name: ignouprep-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ignouprep-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: PORT
        value: 8080
      - key: CORS_ORIGIN
        value: https://ignouprep.lovable.app
      - key: SUPER_ADMIN_EMAILS
        value: soheljavadeveloper@gmail.com,sohejavadeveloper@gmail.com
      - key: GOOGLE_AI_API_KEY
        sync: false
databases:
  - name: ignouprep-db
    plan: starter
    postgresMajorVersion: 16
